{% assign publications = include.publications %}
<section class="publication-section" aria-labelledby="selected-publications-heading">
    <div class="section-heading publication-section-heading">
        <h2 id="selected-publications-heading" class="section-title">
            {% if include.title %}{{ include.title }}{% else %}<i class="fas fa-star" aria-hidden="true"></i> Selected Recent Publications{% endif %}
        </h2>
        <a class="section-link" href="publications">View all <i class="fas fa-arrow-right" aria-hidden="true"></i></a>
    </div>
    <div class="publication-list">
        {% for item in publications limit:include.limit %}
        {% include widgets/publication_item.html item=item %}    
        {% endfor %}
    </div>
</section>
